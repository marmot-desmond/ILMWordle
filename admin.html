<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow">

        <title>ILMWordle Admin</title>

        <link rel="stylesheet" href="./styles/styles.css">
    </head>
    <body>
        <main class="admin-page">
            <h1>ILMWordle Admin</h1>

            <form id="login-form">
                <input id="admin-email" type="email" placeholder="Email" required>
                <input id="admin-password" type="password" placeholder="Password" required>
                <button type="submit">Log in</button>
            </form>

            <section id="admin-panel" hidden>
                <h2>Add words</h2>

                <form id="word-form">
                    <textarea id="word-batch-input" placeholder="apple&#10;crane&#10;spoil"></textarea>
                    <button type="submit">Add words</button>
                </form>
            </section>

            <p id="admin-message"></p>
        </main>

        <script type="module" src="./scripts/admin.js"></script>
    </body>
</html>
